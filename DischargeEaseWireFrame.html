<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DischargeEase Wireframes</title>
    <!-- Added colour -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #333;
            overflow: hidden;
        }

        nav a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background-color: #ddd;
            color: black;
        }

        .card {
            background: white;
            margin: 10px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .card h3 {
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <header>
        <h1>DischargeEase Platform - 👩‍⚕️NURSE VIEW</h1>
    </header>

    <nav>
        <a href="#patient-records">Patient Records</a>
        <a href="#services">Services</a>
    </nav>
    <!-- Added Container for the Webview -->
    <div class="container">
        <section id="dashboard" class="card">
            <h3>Dashboard</h3>
            <p>Overview of pending tasks and recent activity.</p>
            <ul>
                <li>Pending Patient Schedule: 10</li>
            </ul>
        </section>

        <!-- Added LEL Patient Records for the Webview -->
        <section id="patient-records" class="card">
            <h3>Patient Records</h3>
            <div class="form-group">
                <label for="patient-id">Search by Patient ID:</label>
                <input type="text" id="patient-id" placeholder="Enter Patient ID to search for medical records">
            </div>
            <button>Search</button>
            <p>No records found. Please refine your search.</p>
        </section>

        <!-- Added LWJ services for the Webview -->
        <section id="services" class="card">
            <h3>Service Booking</h3>
            <form>
                <div class="form-group">
                    <label for="service">Select Service:</label>
                    <select id="service">
                        <option>Medication Counseling</option>
                        <option>Caregiver Training</option>
                        <option>Home Safety Assessment</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Select Date:</label>
                    <input type="date" id="date">
                </div>

                <button>Book Service</button>
            </form>
        </section>

    </div>
</body>

</html>
